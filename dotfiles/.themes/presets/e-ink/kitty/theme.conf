# ~/.config/hypr/themes/e-ink-dark/kitty.conf
# High Contrast E-Ink Dark Mode

foreground           #ffffff
background           #050505
selection_foreground #050505
selection_background #ffffff
cursor               #ffffff
cursor_text_color    #050505

# Gray-scale mapping (No colors, just ink)
# Black/Gray
color0  #1a1a1a
color8  #333333

# Red/Green/Yellow/Blue (Mapped to Bright Grays)
color1  #e0e0e0
color9  #f0f0f0
color2  #d0d0d0
color10 #e0e0e0
color3  #c0c0c0
color11 #d0d0d0
color4  #b0b0b0
color12 #c0c0c0

# Magenta/Cyan/White
color5  #a0a0a0
color13 #b0b0b0
color6  #909090
color14 #a0a0a0
color7  #ffffff
color15 #ffffff
