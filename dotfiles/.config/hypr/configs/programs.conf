# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

	$terminal = kitty
	$fileManager = thunar
	$menu = rofi -show drun
	# Mullvad Browser is the default browser (installed via apply-dots.sh)
	$browser = mullvad-browser
	# Discord with Vencord applied (installed via apply-dots.sh)
	$message = flatpak run com.discordapp.Discord
	# Telegram (installed via apply-dots.sh)
	$telegram = flatpak run org.telegram.desktop
	# Zed editor (installed via apply-dots.sh)
	$editor = zed

	$wallpick = $HOME/.config/rofi/minimal/wallpaper.rasi
	$applauncher = $HOME/.config/rofi/minimal/config.rasi

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
